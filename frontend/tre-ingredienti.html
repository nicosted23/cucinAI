<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3 Ingredienti - CucinAI</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="nav-logo">CucinAI</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tre-ingredienti.html">3 Ingredienti</a>
        <a href="ricerca-ricette.html">Ricerca ricette</a>
        <a href="ricette-salvate.html">Ricette salvate</a>
        <a href="abbonamenti.html">Abbonamenti</a>
      </div>
    </nav>

    <h1 class="page-title">Cucina con 3 ingredienti</h1>
    <p class="sub">Inserisci 3 ingredienti e ottieni 3 ricette diverse, pratiche e ben spiegate.</p>

    <section class="tool-layout">
      <aside class="card tool-sidebar">
        <h2 class="section-title">Trova una ricetta</h2>
        <p>Scegli ingredienti, tempo e difficoltà. Al resto pensiamo noi.</p>

        <form id="recipeForm">
          <label for="ingredient1">Ingrediente 1</label>
          <input id="ingredient1" name="ingredient1" placeholder="Es. uova" required />

          <label for="ingredient2">Ingrediente 2</label>
          <input id="ingredient2" name="ingredient2" placeholder="Es. zucchine" required />

          <label for="ingredient3">Ingrediente 3</label>
          <input id="ingredient3" name="ingredient3" placeholder="Es. parmigiano" required />

          <label for="maxTime">Tempo massimo</label>
          <select id="maxTime" name="maxTime">
            <option value="qualsiasi" selected>Qualsiasi</option>
            <option value="15">15 minuti</option>
            <option value="20">20 minuti</option>
            <option value="30">30 minuti</option>
            <option value="45">45 minuti</option>
          </select>

          <label for="difficulty">Difficoltà</label>
          <select id="difficulty" name="difficulty">
            <option value="qualsiasi" selected>Qualsiasi</option>
            <option value="facile">Facile</option>
            <option value="media">Media</option>
            <option value="difficile">Difficile</option>
          </select>

          <div class="form-actions">
  <button type="submit">Genera ricette</button>
  <button type="button" id="regenerateBtn" class="secondary-btn">Rigenera</button>
  <button type="button" id="randomGenerateBtn" class="secondary-btn">Genera casualmente</button>
</div>
        </form>
      </aside>

      <section class="tool-results">
        <div id="results" class="results-grid three-recipe-layout"></div>
      </section>
    </section>
  </div>

  <script src="js/script.js"></script>
</body>
</html>

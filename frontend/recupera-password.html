<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recupera password | CucinAI</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home-desktop.css" />
  <link rel="stylesheet" href="css/recupera-password.css" />
</head>
<body class="auth-page auth-recover-page">
  <header class="auth-topbar">
    <a href="index.html" class="auth-logo">CucinAI</a>
    <nav class="auth-top-links">
      <a href="login.html">Accedi</a>
      <a href="registrazione.html">Registrati</a>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-shell auth-shell-single">
      <div class="auth-card auth-card-single">
        <div class="auth-card-head">
          <h2>Recupera la tua password</h2>
          <p>Inserisci la tua email. Per ora questa schermata è pronta lato interfaccia.</p>
        </div>

        <form id="recoverForm" class="auth-form">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Inserisci la tua email" required />

          <div id="recoverMessage" class="auth-message"></div>

          <button type="submit" class="auth-submit">Invia richiesta</button>
        </form>

        <div class="auth-footer">
          <a href="login.html" class="auth-secondary-btn">Torna al login</a>
        </div>
      </div>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/recupera-password.js"></script>
</body>
</html>
